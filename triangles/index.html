<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triangle Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f0f0f0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
  }
  canvas {
    cursor: crosshair;
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 8px;
    background: #ffffff;
    box-shadow: 0 2px 20px rgba(0,0,0,0.08);
  }
  #stats {
    position: fixed;
    top: 16px;
    left: 16px;
    color: rgba(0,0,0,0.45);
    font-size: 12px;
    font-family: 'SF Mono', 'Consolas', monospace;
    line-height: 1.6;
    pointer-events: none;
  }
  #controls {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 10;
  }
  #controls button {
    padding: 10px 24px;
    border: none;
    border-radius: 24px;
    font-size: 14px;
    cursor: pointer;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    transition: background 0.2s, opacity 0.2s;
  }
  #generateBtn {
    background: #333;
    color: #fff;
  }
  #generateBtn:hover { background: #555; }
  #generateBtn:disabled { opacity: 0.4; cursor: default; }
  #clearBtn {
    background: #e0e0e0;
    color: #333;
  }
  #clearBtn:hover { background: #ccc; }
  #hint {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(0,0,0,0.35);
    font-size: 13px;
    pointer-events: none;
    transition: opacity 0.5s;
  }
</style>
</head>
<body>
<div id="stats"></div>
<div id="controls">
  <button id="generateBtn" disabled>Generate</button>
  <button id="clearBtn">Clear</button>
</div>
<canvas id="canvas"></canvas>
<div id="hint">Draw a shape on the canvas &middot; Press Generate to fill it &middot; Space to recolor &middot; Enter to save</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const hint = document.getElementById('hint');
const statsEl = document.getElementById('stats');
const generateBtn = document.getElementById('generateBtn');
const clearBtn = document.getElementById('clearBtn');

const padding = 40;
let W, H;

function resizeCanvas() {
  canvas.width = window.innerWidth - padding;
  canvas.height = window.innerHeight - padding;
  W = canvas.width;
  H = canvas.height;
}
resizeCanvas();

let allTriangles = [];
let allColorData = [];
let generating = false;
let currentBaseHue = Math.random() * 360;
let currentColorMode = 0;

// ── Drawing state ──
let drawing = false;
let drawPath = [];
let hasShape = false;

// ── Shape mask ──
let maskData = null;

function createMaskFromPath(path) {
  const offscreen = document.createElement('canvas');
  offscreen.width = W;
  offscreen.height = H;
  const oc = offscreen.getContext('2d');

  oc.fillStyle = '#000';
  oc.fillRect(0, 0, W, H);

  if (path.length < 3) return null;

  oc.fillStyle = '#fff';
  oc.beginPath();
  oc.moveTo(path[0][0], path[0][1]);
  for (let i = 1; i < path.length; i++) {
    oc.lineTo(path[i][0], path[i][1]);
  }
  oc.closePath();
  oc.fill();

  return oc.getImageData(0, 0, W, H);
}

function isMaskWhite(imgData, x, y) {
  if (!imgData) return true;
  const ix = Math.round(x);
  const iy = Math.round(y);
  if (ix < 0 || ix >= W || iy < 0 || iy >= H) return false;
  const idx = (iy * W + ix) * 4;
  return imgData.data[idx] > 128;
}

function isTriangleInMask(tri, imgData) {
  if (!imgData) return true;
  const cx = (tri[0][0] + tri[1][0] + tri[2][0]) / 3;
  const cy = (tri[0][1] + tri[1][1] + tri[2][1]) / 3;
  const cIn = isMaskWhite(imgData, cx, cy);
  let vIn = 0;
  for (const p of tri) {
    if (isMaskWhite(imgData, p[0], p[1])) vIn++;
  }
  return cIn && vIn >= 1;
}

function findStartInMask(mask) {
  let sumX = 0, sumY = 0, count = 0;
  const step = 8;
  for (let y = 0; y < H; y += step) {
    for (let x = 0; x < W; x += step) {
      if (isMaskWhite(mask, x, y)) { sumX += x; sumY += y; count++; }
    }
  }
  if (count === 0) return [W / 2, H / 2];
  return [sumX / count, sumY / count];
}

// ── Draw the user's stroke on canvas ──
function drawUserPath() {
  if (drawPath.length < 2) return;
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(drawPath[0][0], drawPath[0][1]);
  for (let i = 1; i < drawPath.length; i++) {
    ctx.lineTo(drawPath[i][0], drawPath[i][1]);
  }
  ctx.closePath();
  ctx.stroke();
  ctx.setLineDash([]);
}

// ── Geometry ──
function randomHue() { return Math.random() * 360; }

function dist(a, b) {
  return Math.hypot(a[0] - b[0], a[1] - b[1]);
}

function midpoint(a, b) {
  return [(a[0] + b[0]) / 2, (a[1] + b[1]) / 2];
}

function triangleArea(a, b, c) {
  return Math.abs((b[0] - a[0]) * (c[1] - a[1]) - (c[0] - a[0]) * (b[1] - a[1])) / 2;
}

function centroid(tri) {
  return [
    (tri[0][0] + tri[1][0] + tri[2][0]) / 3,
    (tri[0][1] + tri[1][1] + tri[2][1]) / 3
  ];
}

function segmentsIntersect(p1, p2, p3, p4) {
  const d1 = cross(p3, p4, p1);
  const d2 = cross(p3, p4, p2);
  const d3 = cross(p1, p2, p3);
  const d4 = cross(p1, p2, p4);
  if (((d1 > 0 && d2 < 0) || (d1 < 0 && d2 > 0)) &&
      ((d3 > 0 && d4 < 0) || (d3 < 0 && d4 > 0))) {
    return true;
  }
  return false;
}

function cross(pi, pj, pk) {
  return (pk[0] - pi[0]) * (pj[1] - pi[1]) - (pj[0] - pi[0]) * (pk[1] - pi[1]);
}

function pointsClose(a, b) { return dist(a, b) < 2; }

function pointStrictlyInTriangle(p, t) {
  const [a, b, c] = t;
  const v0 = [c[0] - a[0], c[1] - a[1]];
  const v1 = [b[0] - a[0], b[1] - a[1]];
  const v2 = [p[0] - a[0], p[1] - a[1]];
  const dot00 = v0[0] * v0[0] + v0[1] * v0[1];
  const dot01 = v0[0] * v1[0] + v0[1] * v1[1];
  const dot02 = v0[0] * v2[0] + v0[1] * v2[1];
  const dot11 = v1[0] * v1[0] + v1[1] * v1[1];
  const dot12 = v1[0] * v2[0] + v1[1] * v2[1];
  const inv = 1 / (dot00 * dot11 - dot01 * dot01);
  const u = (dot11 * dot02 - dot01 * dot12) * inv;
  const v = (dot00 * dot12 - dot01 * dot02) * inv;
  const eps = 0.01;
  return (u > eps) && (v > eps) && (u + v < 1 - eps);
}

function trianglesOverlap(t1, t2) {
  for (const p of t1) { if (pointStrictlyInTriangle(p, t2)) return true; }
  for (const p of t2) { if (pointStrictlyInTriangle(p, t1)) return true; }
  const edges1 = [[t1[0], t1[1]], [t1[1], t1[2]], [t1[2], t1[0]]];
  const edges2 = [[t2[0], t2[1]], [t2[1], t2[2]], [t2[2], t2[0]]];
  for (const e1 of edges1) {
    for (const e2 of edges2) {
      if (pointsClose(e1[0], e2[0]) || pointsClose(e1[0], e2[1]) ||
          pointsClose(e1[1], e2[0]) || pointsClose(e1[1], e2[1])) continue;
      if (segmentsIntersect(e1[0], e1[1], e2[0], e2[1])) return true;
    }
  }
  return false;
}

function inBounds(p, margin = 10) {
  return p[0] > margin && p[0] < W - margin && p[1] > margin && p[1] < H - margin;
}

function overlapsAny(newTri) {
  for (const existing of allTriangles) {
    if (trianglesOverlap(newTri, existing)) return true;
  }
  return false;
}

let sharedEdges = new Set();

function edgeKey(a, b) {
  const sa = `${a[0].toFixed(1)},${a[1].toFixed(1)}`;
  const sb = `${b[0].toFixed(1)},${b[1].toFixed(1)}`;
  return sa < sb ? `${sa}|${sb}` : `${sb}|${sa}`;
}
function markEdgeShared(a, b) { sharedEdges.add(edgeKey(a, b)); }
function isEdgeShared(a, b) { return sharedEdges.has(edgeKey(a, b)); }

function getFreeEdges(tri) {
  const edges = [[tri[0], tri[1]], [tri[1], tri[2]], [tri[2], tri[0]]];
  return edges.filter(e => !isEdgeShared(e[0], e[1]));
}

function findNearbyVertex(p, edgeA, edgeB, maxDist) {
  let best = null;
  let bestDist = Infinity;
  for (const tri of allTriangles) {
    for (const v of tri) {
      if (pointsClose(v, edgeA) || pointsClose(v, edgeB)) continue;
      const d = dist(p, v);
      if (d < bestDist && d < maxDist && d > 5) {
        const candidate = [edgeA, edgeB, v];
        if (!overlapsAny(candidate) && inBounds(v)) { bestDist = d; best = v; }
      }
    }
  }
  return best;
}

function generateThirdPoint(edgeA, edgeB, existingTri) {
  const mid = midpoint(edgeA, edgeB);
  const edgeLen = dist(edgeA, edgeB);
  const dx = edgeB[0] - edgeA[0];
  const dy = edgeB[1] - edgeA[1];
  const norm1 = [-dy, dx];
  const norm2 = [dy, -dx];
  const len = Math.hypot(norm1[0], norm1[1]);
  if (len === 0) return null;

  for (let i = 0; i < 80; i++) {
    const heightFactor = 0.3 + Math.random() * 1.0;
    const height = edgeLen * heightFactor;
    let norm;
    norm = (Math.random() < 0.5) ? norm1 : norm2;
    if (existingTri) {
      const ec = centroid(existingTri);
      const t1 = [mid[0] + norm1[0] / len * height, mid[1] + norm1[1] / len * height];
      const t2 = [mid[0] + norm2[0] / len * height, mid[1] + norm2[1] / len * height];
      norm = (dist(t1, ec) > dist(t2, ec)) ? norm1 : norm2;
    }
    const lateralOffset = (Math.random() - 0.5) * edgeLen * 0.7;
    const px = mid[0] + (norm[0] / len) * height + (dx / len) * lateralOffset;
    const py = mid[1] + (norm[1] / len) * height + (dy / len) * lateralOffset;
    const point = [px, py];
    if (!inBounds(point, 15)) continue;
    const area = triangleArea(edgeA, edgeB, point);
    if (area < 200 || area > 2000) continue;
    const candidate = [edgeA, edgeB, point];
    if (!overlapsAny(candidate)) {
      const snapped = findNearbyVertex(point, edgeA, edgeB, edgeLen * 0.8);
      if (snapped) {
        const snapArea = triangleArea(edgeA, edgeB, snapped);
        if (snapArea >= 200 && snapArea <= 2000 && !overlapsAny([edgeA, edgeB, snapped])) return snapped;
      }
      return point;
    }
  }
  return null;
}

// ── Drawing ──
function clearCanvas() {
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);
}

function drawTriangle(tri, colorData) {
  const { h, s, l } = colorData;
  ctx.beginPath();
  ctx.moveTo(tri[0][0], tri[0][1]);
  ctx.lineTo(tri[1][0], tri[1][1]);
  ctx.lineTo(tri[2][0], tri[2][1]);
  ctx.closePath();
  ctx.fillStyle = `hsl(${h}, ${s}%, ${l}%)`;
  ctx.fill();
}

function redrawAll() {
  clearCanvas();
  for (let i = 0; i < allTriangles.length; i++) {
    drawTriangle(allTriangles[i], allColorData[i]);
  }
  if (hasShape && allTriangles.length === 0) {
    drawUserPath();
  }
}

// ── Palettes ──
function generatePalette(baseHue, count, mode) {
  switch (mode) {
    case 0: return paletteDarkToLight(baseHue, count);
    case 1: return paletteLightToDark(baseHue, count);
    case 2: return paletteRandomLightness(baseHue, count);
    case 3: return paletteGradient(baseHue, count);
    default: return paletteRandomLightness(baseHue, count);
  }
}

function paletteDarkToLight(baseHue, count) {
  const colors = [];
  for (let i = 0; i < count; i++) {
    const t = count > 1 ? i / (count - 1) : 0.5;
    colors.push({ h: (baseHue + (Math.random() - 0.5) * 25 + 360) % 360, s: 50 + Math.random() * 30, l: 20 + t * 55 });
  }
  return colors;
}
function paletteLightToDark(baseHue, count) { return paletteDarkToLight(baseHue, count).reverse(); }
function paletteRandomLightness(baseHue, count) {
  const colors = [];
  for (let i = 0; i < count; i++) {
    colors.push({ h: (baseHue + (Math.random() - 0.5) * 25 + 360) % 360, s: 45 + Math.random() * 35, l: 25 + Math.random() * 50 });
  }
  return colors;
}
function paletteGradient(baseHue, count) {
  const endHue = (baseHue + 40 + Math.random() * 100) % 360;
  const colors = [];
  for (let i = 0; i < count; i++) {
    const t = count > 1 ? i / (count - 1) : 0.5;
    colors.push({ h: (baseHue + ((endHue - baseHue + 360) % 360) * t) % 360, s: 50 + Math.random() * 25, l: 35 + Math.random() * 25 });
  }
  return colors;
}

// ── Stats ──
function countOpenGaps() {
  let gaps = 0;
  for (const tri of allTriangles) {
    const edges = [[tri[0], tri[1]], [tri[1], tri[2]], [tri[2], tri[0]]];
    for (const e of edges) {
      if (!isEdgeShared(e[0], e[1])) gaps++;
    }
  }
  return gaps;
}

function updateStats() {
  if (allTriangles.length === 0) { statsEl.textContent = ''; return; }
  let minArea = Infinity, maxArea = 0;
  for (const tri of allTriangles) {
    const a = triangleArea(tri[0], tri[1], tri[2]);
    if (a < minArea) minArea = a;
    if (a > maxArea) maxArea = a;
  }
  const gaps = countOpenGaps();
  statsEl.innerHTML =
    `Triangles: ${allTriangles.length}<br>` +
    `Smallest: ${Math.round(minArea)} px²<br>` +
    `Largest: ${Math.round(maxArea)} px²<br>` +
    `Open gaps: ${gaps}`;
}

// ── Generation (fills drawn shape) ──
async function generateInShape() {
  if (generating || !maskData) return;
  generating = true;
  generateBtn.disabled = true;
  hint.style.opacity = '0';

  allTriangles = [];
  allColorData = [];
  sharedEdges = new Set();
  clearCanvas();

  currentBaseHue = randomHue();
  currentColorMode = Math.floor(Math.random() * 4);

  const paletteSize = 200;
  const palette = generatePalette(currentBaseHue, paletteSize, currentColorMode);

  // Find start inside the mask
  const start = findStartInMask(maskData);

  // First triangle
  let firstTri = null;
  for (let attempt = 0; attempt < 200; attempt++) {
    const ox = start[0] + (Math.random() - 0.5) * 80;
    const oy = start[1] + (Math.random() - 0.5) * 80;
    const size = 10 + Math.random() * 30;
    const a1 = Math.random() * Math.PI * 2;
    const a2 = a1 + (Math.PI / 3) + Math.random() * (Math.PI / 2);
    const p1 = [ox, oy];
    const p2 = [ox + Math.cos(a1) * size, oy + Math.sin(a1) * size];
    const p3 = [ox + Math.cos(a2) * size, oy + Math.sin(a2) * size];
    const tri = [p1, p2, p3];
    const area = triangleArea(p1, p2, p3);
    if (area >= 200 && area <= 2000 && inBounds(p2) && inBounds(p3) && isTriangleInMask(tri, maskData)) {
      firstTri = tri;
      break;
    }
  }

  if (!firstTri) { generating = false; generateBtn.disabled = false; return; }

  allTriangles.push(firstTri);
  allColorData.push(palette[0]);
  drawTriangle(firstTri, palette[0]);
  updateStats();

  let lastTriIndex = 0;
  let consecutiveFails = 0;
  const maxTriangles = 5000; // safety cap

  while (consecutiveFails <= 30 && allTriangles.length < maxTriangles) {
    await new Promise(r => setTimeout(r, 100));

    let placed = false;
    const t = allTriangles.length;

    // Try growing from last placed triangle
    let freeEdges = getFreeEdges(allTriangles[lastTriIndex]).map(e => ({
      edge: e, triIndex: lastTriIndex
    }));
    freeEdges.sort(() => Math.random() - 0.5);

    for (const { edge, triIndex } of freeEdges) {
      const [eA, eB] = edge;
      const thirdPt = generateThirdPoint(eA, eB, allTriangles[triIndex]);
      if (thirdPt) {
        const newTri = [eA, eB, thirdPt];
        if (!isTriangleInMask(newTri, maskData)) continue;
        allTriangles.push(newTri);
        allColorData.push(palette[t % paletteSize]);
        markEdgeShared(eA, eB);
        drawTriangle(newTri, palette[t % paletteSize]);
        lastTriIndex = allTriangles.length - 1;
        updateStats();
        placed = true;
        consecutiveFails = 0;
        break;
      }
    }

    // Fallback: try all triangles
    if (!placed) {
      let allFree = [];
      for (let ti = 0; ti < allTriangles.length; ti++) {
        if (ti === lastTriIndex) continue;
        for (const e of getFreeEdges(allTriangles[ti])) allFree.push({ edge: e, triIndex: ti });
      }
      allFree.sort(() => Math.random() - 0.5);
      for (const { edge, triIndex } of allFree) {
        const [eA, eB] = edge;
        const thirdPt = generateThirdPoint(eA, eB, allTriangles[triIndex]);
        if (thirdPt) {
          const newTri = [eA, eB, thirdPt];
          if (!isTriangleInMask(newTri, maskData)) continue;
          allTriangles.push(newTri);
          allColorData.push(palette[t % paletteSize]);
          markEdgeShared(eA, eB);
          drawTriangle(newTri, palette[t % paletteSize]);
          lastTriIndex = allTriangles.length - 1;
          updateStats();
          placed = true;
          consecutiveFails = 0;
          break;
        }
      }
    }

    if (!placed) {
      consecutiveFails++;
    }
  }

  generating = false;
  generateBtn.disabled = false;
  hint.textContent = "Done! Space to recolor \u00b7 Enter to save \u00b7 Draw again to start over";
  hint.style.opacity = '1';
}

// ── Recolor ──
function recolorAll() {
  if (allTriangles.length === 0 || generating) return;
  currentBaseHue = randomHue();
  currentColorMode = Math.floor(Math.random() * 4);
  const palette = generatePalette(currentBaseHue, allTriangles.length, currentColorMode);
  allColorData = palette;
  redrawAll();
}

function downloadCanvas() {
  const tmp = document.createElement('canvas');
  tmp.width = W; tmp.height = H;
  const tmpCtx = tmp.getContext('2d');
  tmpCtx.fillStyle = '#ffffff';
  tmpCtx.fillRect(0, 0, W, H);
  tmpCtx.drawImage(canvas, 0, 0);
  const link = document.createElement('a');
  link.download = `triangles-${Date.now()}.png`;
  link.href = tmp.toDataURL('image/png');
  link.click();
}

function resetAll() {
  if (generating) return;
  drawPath = [];
  hasShape = false;
  maskData = null;
  allTriangles = [];
  allColorData = [];
  sharedEdges = new Set();
  generateBtn.disabled = true;
  statsEl.textContent = '';
  clearCanvas();
  hint.style.opacity = '1';
}

// ── Events: Drawing ──
canvas.addEventListener('mousedown', (e) => {
  if (generating) return;
  const rect = canvas.getBoundingClientRect();
  drawing = true;
  drawPath = [[e.clientX - rect.left, e.clientY - rect.top]];
  // Reset previous
  allTriangles = [];
  allColorData = [];
  sharedEdges = new Set();
  hasShape = false;
  maskData = null;
  generateBtn.disabled = true;
  statsEl.textContent = '';
  clearCanvas();
});

canvas.addEventListener('mousemove', (e) => {
  if (!drawing) return;
  const rect = canvas.getBoundingClientRect();
  drawPath.push([e.clientX - rect.left, e.clientY - rect.top]);
  clearCanvas();
  drawUserPath();
});

canvas.addEventListener('mouseup', () => {
  if (!drawing) return;
  drawing = false;
  if (drawPath.length >= 3) {
    hasShape = true;
    maskData = createMaskFromPath(drawPath);
    generateBtn.disabled = false;
    clearCanvas();
    drawUserPath();
  }
});

canvas.addEventListener('mouseleave', () => {
  if (!drawing) return;
  drawing = false;
  if (drawPath.length >= 3) {
    hasShape = true;
    maskData = createMaskFromPath(drawPath);
    generateBtn.disabled = false;
    clearCanvas();
    drawUserPath();
  }
});

// ── Buttons ──
generateBtn.addEventListener('click', generateInShape);
clearBtn.addEventListener('click', resetAll);

// ── Keyboard ──
window.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    downloadCanvas();
  } else if (e.key === ' ') {
    e.preventDefault();
    recolorAll();
  }
});

window.addEventListener('resize', () => {
  resizeCanvas();
  redrawAll();
});

clearCanvas();
</script>
</body>
</html>
